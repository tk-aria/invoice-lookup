name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build (all, linux, macos, windows)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - macos
          - windows

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: invoice-cli

jobs:
  # ---------- Linux ----------
  build-linux:
    name: Build (x86_64-unknown-linux-gnu)
    if: inputs.platform == '' || inputs.platform == 'all' || inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86_64-unknown-linux-gnu-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build -p invoice-lookup-cli --release --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          TAG_NAME="${{ github.ref_name }}"
          # workflow_dispatch の場合は dev ラベル
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "main" ]; then
            TAG_NAME="dev"
          fi
          ARCHIVE_NAME="${BINARY_NAME}-${TAG_NAME}-x86_64-unknown-linux-gnu"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/x86_64-unknown-linux-gnu/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ env.ASSET }}

  # ---------- macOS ----------
  build-macos:
    name: Build (aarch64-apple-darwin)
    if: inputs.platform == '' || inputs.platform == 'all' || inputs.platform == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: aarch64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build -p invoice-lookup-cli --release --target aarch64-apple-darwin

      - name: Package
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [ -z "$TAG_NAME" ] || [ "$TAG_NAME" = "main" ]; then
            TAG_NAME="dev"
          fi
          ARCHIVE_NAME="${BINARY_NAME}-${TAG_NAME}-aarch64-apple-darwin"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/aarch64-apple-darwin/release/${BINARY_NAME}" "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-aarch64-apple-darwin
          path: ${{ env.ASSET }}

  # ---------- Windows ----------
  build-windows:
    name: Build (x86_64-pc-windows-msvc)
    if: inputs.platform == '' || inputs.platform == 'all' || inputs.platform == 'windows'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86_64-pc-windows-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build -p invoice-lookup-cli --release --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if (-not $tagName -or $tagName -eq "main") { $tagName = "dev" }
          $archiveName = "${{ env.BINARY_NAME }}-${tagName}-x86_64-pc-windows-msvc"
          New-Item -ItemType Directory -Force -Path $archiveName
          Copy-Item "target/x86_64-pc-windows-msvc/release/${{ env.BINARY_NAME }}.exe" "$archiveName/"
          Compress-Archive -Path "$archiveName" -DestinationPath "$archiveName.zip"
          echo "ASSET=$archiveName.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-pc-windows-msvc
          path: ${{ env.ASSET }}

  # ---------- GitHub Release ----------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/') && !failure() && !cancelled()
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
